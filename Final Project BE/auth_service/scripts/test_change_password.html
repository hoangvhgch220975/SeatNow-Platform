<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatNow Auth - Change Password Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-12 px-4">
    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">SeatNow</h1>
            <p class="text-slate-500 mt-2">Change Password Test Tool</p>
        </div>

        <!-- Login Card -->
        <div id="loginSection" class="glass-card rounded-2xl shadow-xl p-8 mb-6">
            <h2 class="text-xl font-bold text-slate-800 mb-6">1. Login First</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Phone or Email</label>
                    <input type="text" id="identifier" value="+84818990222" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" value="P@ssw0rd!" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <button onclick="login()" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">
                    Login & Get Token
                </button>
            </div>
        </div>

        <!-- Change Password Card -->
        <div id="changeSection" class="glass-card rounded-2xl shadow-xl p-8 hidden opacity-0 transition-opacity duration-500">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-slate-800">2. Change Password</h2>
                <span class="bg-green-100 text-green-700 text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">Authenticated</span>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Old Password</label>
                    <input type="password" id="oldPassword" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div class="pt-2 border-t border-slate-100">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">New Password</label>
                    <input type="password" id="newPassword" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <button onclick="changePassword()" id="changeBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95 mt-2">
                    Update Password
                </button>
            </div>
            
            <button onclick="logout()" class="mt-6 text-sm text-slate-400 hover:text-rose-500 transition-colors w-full text-center">
                Logout / Start Over
            </button>
        </div>

        <!-- Response Area -->
        <div id="responseArea" class="mt-8 hidden">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">Response</p>
            <pre id="responseLog" class="p-4 rounded-xl bg-slate-900 text-emerald-400 text-xs overflow-x-auto border border-slate-800 shadow-inner leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const AUTH_API = 'http://localhost:3001/api/v1/auth';
        let accessToken = '';

        function showResponse(data, isError = false) {
            const area = document.getElementById('responseArea');
            const log = document.getElementById('responseLog');
            area.classList.remove('hidden');
            log.textContent = JSON.stringify(data, null, 2);
            log.className = isError 
                ? "p-4 rounded-xl bg-slate-900 text-rose-400 text-xs overflow-x-auto border border-slate-800"
                : "p-4 rounded-xl bg-slate-900 text-emerald-400 text-xs overflow-x-auto border border-slate-800";
        }

        async function login() {
            const btn = document.getElementById('loginBtn');
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('loginPassword').value;

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch(`${AUTH_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    accessToken = data.accessToken.accessToken || data.accessToken;
                    showResponse({ message: 'Login Success', user: data.user });
                    
                    // Show change section
                    const changeSection = document.getElementById('changeSection');
                    document.getElementById('loginSection').classList.add('hidden');
                    changeSection.classList.remove('hidden');
                    setTimeout(() => changeSection.classList.add('opacity-100'), 50);
                } else {
                    showResponse(data, true);
                }
            } catch (err) {
                showResponse({ error: err.message }, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login & Get Token';
            }
        }

        async function changePassword() {
            const btn = document.getElementById('changeBtn');
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!accessToken) return alert('Please login first');

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const res = await fetch(`${AUTH_API}/change-password`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({ oldPassword, newPassword, confirmPassword })
                });

                const data = await res.json();
                showResponse(data, !res.ok);
                
                if (res.ok) {
                    alert('Password changed successfully! You can now try to login with your new password.');
                    // Optional: reset fields
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                }
            } catch (err) {
                showResponse({ error: err.message }, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        function logout() {
            accessToken = '';
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('changeSection').classList.add('hidden');
            document.getElementById('changeSection').classList.remove('opacity-100');
            document.getElementById('responseArea').classList.add('hidden');
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
    </script>
</body>
</html>
